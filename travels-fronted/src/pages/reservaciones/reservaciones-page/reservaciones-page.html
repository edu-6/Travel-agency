<app-header></app-header>


<div class="container text-center my-5">

    <div class="d-flex flex-column align-items-center gap-3 w-100">


        <div class="row justify-content-center gap-2">
            <div class="col-auto">
                <a routerLink="/reservaciones/form-page" class="btn btn-primary">
                    <i class="bi bi-file-earmark-plus"></i> Nueva reservación
                </a>
            </div>
            <div class="col-auto">
                <a class="btn btn-primary">
                    <i class="bi bi-calendar-event-fill" (click)="buscarReservacionesHoy()"></i> Hoy
                </a>
            </div>
        </div>


        @if (hayError()) {
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>Error! </strong> {{mensajeError}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        }
    </div>
</div>




<div class="row row-cols-1 row-cols-md-3 g-4">
    @for(r of reservacionesHoy(); track r.id){
    <app-reservacion-card [reservacion]="r" [mostrarBtnDetalles]="true"></app-reservacion-card>
    }
</div>
