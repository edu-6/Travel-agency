<app-header></app-header>


<div class="container text-center my-5">

    <div class="d-flex flex-column align-items-center gap-3 w-100">


        <div class="row justify-content-center gap-2">
            <div class="col-auto">
                <a routerLink="/reservaciones/form-page" class="btn btn-primary">
                    <i class="bi bi-file-earmark-plus"></i> Nueva reservación
                </a>
            </div>
            <div class="col-auto">
                <a routerLink="/cosas" class="btn btn-primary">
                    <i class="bi bi-calendar-event-fill"></i> Hoy
                </a>
            </div>
        </div>


        @if (hayError()) {
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>Error! </strong> {{mensajeError}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        }
    </div>
</div>
