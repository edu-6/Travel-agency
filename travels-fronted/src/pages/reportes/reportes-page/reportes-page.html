<app-header></app-header>

<div class="container text-center my-5">
    <div class="d-flex flex-column align-items-center gap-3 w-100">



        <div class="d-flex justify-content-center gap-2 w-100" style="max-width: 1000px;">

            <div [formGroup]="formulario" class="d-flex justify-content-center gap-2 w-100" style="max-width: 1000px;">


                <select id="eventType" #comboDestino name="eventType" class="form-select" formControlName="tipoReporte">
                    @for (reporte of listaReportes; track reporte) {
                    <option [value]="reporte">
                        {{ reporte}}
                    </option>
                    }
                </select>


                <input type="date" class="form-control" formControlName="fechaInicio">
                <input type="date" class="form-control" formControlName="fechaFinal">


                <button class="btn btn-outline-primary" style="white-space: nowrap;"
                    (click)="resetearFormulario(comboDestino.value)">
                    Borrar
                </button>

                <button class="btn btn-outline-primary" style="white-space: nowrap;"
                    (click)="generarReporte(comboDestino.value)">
                    Generar
                </button>
            </div>

        </div>

        <div class="d-flex justify-content-center">
            <a routerLink="/exportar" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Exportar
            </a>
        </div>


        @if (hayError()) {
        <div class="alert alert-danger alert-dismissible fade show w-100" role="alert" style="max-width: 600px;">
            <strong>Error! </strong> {{mensajeError}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        }

    </div>
</div>



<!---
  public listaReportes: string[] = [
    "Reporte de ganancias",
    "Reporte del agente con mas ventas",
    "Reporte de ganancias en un intervalo de tiempo",
    "Reporte del agente con más ventas",
    "Reporte del agente con más ganancias",
    "Reporte del paquete más vendido",
    "Reporte del paquete menos vendido",
    "Reporte de ocupación por destino"
  ];

-->

@if(reporteActivo("Reporte de ganancias")){
<app-reporte-ganancias [reporte]="reporteGanancias()!"></app-reporte-ganancias>

}


@if(reporteActivo("Reporte del agente con mas ventas") && reporteAgenteMasVentas()){
<app-reporte-agente-ventas [reporte]="reporteAgenteMasVentas()!"></app-reporte-agente-ventas>

}
