<div class="text-center mt-5">
    <h5>Ingrese archivo txt</h5>

    <div class="d-flex justify-content-center mb-3">
        <input class="form-control w-50" type="file" id="formFile" (change)="alSeleccionarArchivo($event)">
    </div>

    <div class="d-flex justify-content-center">
        <button class="btn btn-primary w-50 py-2" (click)="subir()">Guardar</button>
    </div>

    <br>
    <br>
    <br>

    <table class="table ">
        <thead>
            <tr>
                <th scope="col"> Linea #</th>
                <th scope="col">Resumen</th>
            </tr>
        </thead>
        <tbody>

            @for(log of logs(); track $index){
            <tr>
                <th scope="row">{{$index+1}}</th>
                <td>{{log}}</td>
            </tr>
            }

        </tbody>
    </table>
</div>
