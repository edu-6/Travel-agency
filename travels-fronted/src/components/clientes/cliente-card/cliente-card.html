<div class="card shadow h-100 w-50">
    <div class="card-header text-center bg-light">
        <div class="fw-bold fs-5 text-truncate">
            {{cliente.nombre}}
        </div>
    </div>

    <div class="card-body d-flex flex-column ">

        <div class="mb-3 text-muted small">
            <span class="me-4">
               <i class="bi bi-file-person-fill"></i> {{cliente.identificacion}}
            </span>

            <span class="fw-bold text-danger">
                {{cliente.nombre}}
            </span>
        </div>

        <div class="mb-3 text-start small">
            <span class="me-4">
                <i class="bi bi-telephone-fill"></i> {{cliente.telefono}}
            </span>

            <span class="fw-bold text-muted">
                <i class="bi bi-envelope"></i>{{cliente.correo}}
            </span>
        </div>

        <div class="mb-3 text-muted small">
            <span class="me-4">
                <i class="bi bi-calendar-minus"></i> {{cliente.fechaNacimiento}}
            </span>

            <span class="fw-bold text-muted">
                <i class="bi bi-passport"></i>{{cliente.nacionalidad}}
            </span>
        </div>



        <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-centers">
            <div class="d-flex gap-2">

                @if(puedeEliminar){
                <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                    data-bs-target="#deleteModal" (click)="eliminarAccion()">
                    <i class="bi bi-trash"></i>
                </button>
                }



                <a class="btn btn-outline-primary btn-sm" (click)="redirigirAEditarPage()">
                    <i class="bi bi-pencil-square"></i>
                </a>

                @if(puedeEliminar){
                <a [routerLink]="['/clientes/detalles-page', cliente.identificacion]" class="btn btn-primary btn-sm px-3">
                    <i class="bi bi-eye-fill me-1"></i> Ver perfil
                </a>
                }

            </div>


        </div>
    </div>
</div>
