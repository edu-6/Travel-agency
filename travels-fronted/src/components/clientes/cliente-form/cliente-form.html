<form [formGroup]="formulario" (submit)="enviar()">
    <section class="vh-20">

        <div class="container py-5 h-100">

            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-md-10 col-lg-6">

                    @if (hayError()) {
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>Error!</strong> {{mensajeError}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    }


                    <div class="card shadow-2-strong" style="border-radius: 1rem;">
                        <div class="card-body p-5">


                            <h3 class="mb-5 text-center">Cliente</h3>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-4 mb-md-0">

                                    <label class="form-label">identificacion: </label>

                                    <input type="text" class="form-control" name="name" formControlName="identificacion"
                                        [class.is-invalid]="formulario.controls['identificacion'].invalid && intentoEnviarlo()">
                                    <div class="invalid-feedback">
                                        <div>
                                            identificacion
                                        </div>
                                    </div>
                                </div>


                                <div class="col-md-6 mb-4 mb-md-0">

                                    <label class="form-label">Nombre: </label>

                                    <input type="text" class="form-control" name="name" formControlName="nombre"
                                        [class.is-invalid]="formulario.controls['nombre'].invalid && intentoEnviarlo()">
                                    <div class="invalid-feedback">
                                        <div>
                                            Nombre
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-4 mb-md-0">

                                    <label class="form-label">Telefono: </label>

                                    <input type="number" class="form-control" name="name" formControlName="telefono"
                                        [class.is-invalid]="formulario.controls['telefono'].invalid && intentoEnviarlo()">
                                    <div class="invalid-feedback">
                                        <div>
                                            Telefono
                                        </div>
                                    </div>
                                </div>


                                <div class="col-md-6">
                                    <label class="form-label">Correo @: </label>

                                    <input type="email" class="form-control" name="name" formControlName="correo"
                                        [class.is-invalid]="formulario.controls['correo'].invalid && intentoEnviarlo()">
                                    <div class="invalid-feedback">
                                        <div>
                                            Correo
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-4 mb-md-0">
                                    
                                    <label class="form-label">Nacionalidad: </label>

                                    <select id="eventType" name="eventType" class="form-control"
                                        formControlName="id_nacionalidad"
                                        [class.is-invalid]="formulario.controls['id_nacionalidad'].invalid && intentoEnviarlo()">
                                        <
                                        @for (p of nacionalidades(); track p.id) {
                                        <option [value]="p.id">
                                            {{ p.nombre }}
                                        </option>
                                        }
                                    </select>
                                    <div class="invalid-feedback">
                                        <div>
                                            Seleccione proveedor
                                        </div>
                                    </div>
                                </div>


                                <div class="col-md-6">
                                    <label for="eventType" class="form-label">Fecha nacimiento</label>
                                    

                                    <input type="date" class="form-control" name="name" formControlName="fechaNacimiento"
                                        [class.is-invalid]="formulario.controls['fechaNacimiento'].invalid && intentoEnviarlo()">
                                    <div class="invalid-feedback">
                                        <div>
                                            costo ( > 0)
                                        </div>
                                    </div>
                                </div>
                            </div>


                            <div class="mt-3">
                                <button class="btn btn-primary w-100 py-2" type="submit">Guardar</button>
                            </div>

                            <div class="mt-4">
                                <button type="button" class="btn btn-secondary py-2 w-100">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</form>
