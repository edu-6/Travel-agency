<form [formGroup]="formulario" (submit)="enviar()">
    <section >

        @if (hayError()) {
        <div class="alert alert-danger alert-dismissible fade show" role="alert w-100">
            <strong>Error!</strong> {{mensajeError}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        }

        <div class="card shadow-2-strong" style="border-radius: 1rem;">
            <div class="card-body p-5">

                <h4 class="mb-5 text-center">Pago</h4>
                <div class="row mb-4">
                    <div class="col-md-6 mb-4 mb-md-0">

                        <label class="form-label">Cantidad: </label>

                        <input type="number" class="form-control" name="name" formControlName="cantidad"
                            [class.is-invalid]="formulario.controls['cantidad'].invalid && intentoEnviarlo()">
                        <div class="invalid-feedback">
                            <div>
                                Cantidad ( > 0)
                            </div>
                        </div>
                    </div>


                    <div class="col-md-6">
                        <label for="eventType" class="form-label">Proveedor</label>
                        <select id="eventType" name="eventType" class="form-control" formControlName="id_metodo_pago"
                            [class.is-invalid]="formulario.controls['id_metodo_pago'].invalid && intentoEnviarlo()">
                            @for (p of metodosPago(); track p.id) {
                            <option [value]="p.id">
                                {{ p.nombre }}
                            </option>
                            }
                        </select>
                        <div class="invalid-feedback">
                            <div>
                                Seleccione proveedor
                            </div>
                        </div>
                    </div>
                </div>


                <div class="mt-3">
                    <button class="btn btn-primary w-100 py-2" type="submit">Aceptar</button>
                </div>

                <div class="mt-4">
                    <button type="button" (click)="cerrarFormulario()"
                        class="btn btn-secondary py-2 w-100">Cancelar</button>
                </div>
            </div>
        </div>
    </section>
</form>
